<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ZUARSE</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>ZUARSE</h1>
                <p>Iniciar Sesión</p>
            </div>

            <!-- FORMULARIO UNIFICADO -->
            <form id="form-login" class="form-login active">
                <div class="form-group">
                    <label for="login-identificador">Email o Usuario:</label>
                    <input type="text" id="login-identificador" placeholder="Correo electrónico o usuario admin" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Contraseña:</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">Ingresar</button>

                <div class="form-footer">
                    <label class="checkbox">
                        <input type="checkbox" id="login-recordar">
                        <span>Recuérdame</span>
                    </label>
                    <a href="recuperar-password.html" class="link-recuperar">¿Olvidaste tu contraseña?</a>
                </div>
            </form>

            <div class="login-footer">
                <p>¿Primera vez? <a href="registro.html" class="link-tienda">Crear cuenta</a></p>
                <p>O <a href="index.html" class="link-tienda">ir a la tienda</a></p>
            </div>
        </div>

        <!-- MENSAJE DE ERROR -->
        <div id="error-message" class="error-message" style="display: none;">
            <span id="error-text"></span>
            <button class="btn-close-error">&times;</button>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
